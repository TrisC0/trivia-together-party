<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Together — Join</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    body { font-family:system-ui, sans-serif; margin:0; background:#101427; color:#fff;
           min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; padding:1rem; text-align:center; }
    input { font-size:1.25rem; padding:.6rem; border-radius:10px; border:0; text-transform:uppercase; width:80%; max-width:320px; }
    input.name { text-transform:none; }
    button { font-size:1.25rem; padding:.75rem 1.5rem; border:0; border-radius:12px; background:#7cf; color:#101427; font-weight:700; width:80%; max-width:320px; }
    .answers { display:grid; gap:.75rem; width:100%; max-width:360px; }
    .answers button { width:100%; }
    .answers button:disabled { opacity:.45; }
    .timer { font-size:2rem; font-weight:800; color:#7cf; }
    .big { font-size:2rem; font-weight:800; color:#7cf; margin:.2rem 0; }
    .msg { opacity:.8; }
    .avatars { display:grid; grid-template-columns:repeat(6, 1fr); gap:.4rem; width:100%; max-width:340px; }
    .av { width:auto; font-size:1.5rem; padding:.35rem 0; background:#22305c; border-radius:10px; }
    .av.sel { outline:3px solid #7cf; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script type="module">
    import { signInAnon } from "../shared/firebase.js";
    import { QUESTION_DURATION_MS } from "../shared/scoring.js";
    import { joinRoom, observeRoom, submitAnswer, getRoom } from "../shared/room.js";

    const app = document.getElementById("app");
    const AVATARS = ["🦊", "🐼", "🐸", "🐙", "🦁", "🐝", "🦄", "🐧", "🐢", "🦉", "🐶", "🐱"];
    let code = null, answeredFor = -1, tick = null, selectedAvatar = AVATARS[0];

    const JOIN_KEY = "tt-join";
    let uid = null;
    try {
      uid = await signInAnon();
    } catch (e) {
      app.textContent = "Couldn't connect. Check your connection and refresh.";
      throw e;
    }

    // Reconnect-resume: if we joined a room before, rejoin it instead of asking again.
    const saved = JSON.parse(localStorage.getItem(JOIN_KEY) || "null");
    if (saved && saved.code) {
      const room = await getRoom(saved.code);
      if (room) {
        code = saved.code;
        selectedAvatar = saved.avatar || selectedAvatar;
        await joinRoom(code, uid, saved.name, selectedAvatar);
        observeRoom(code, render);
      } else {
        localStorage.removeItem(JOIN_KEY);
        renderJoin();
      }
    } else {
      renderJoin();
    }

    function renderJoin(error) {
      app.innerHTML = `
        <h2>Join a game</h2>
        ${error ? `<p class="msg">${error}</p>` : ""}
        <input id="code" maxlength="4" placeholder="CODE" />
        <input id="name" class="name" maxlength="24" placeholder="Your name" />
        <div class="avatars">${AVATARS.map(a =>
          `<button type="button" class="av ${a === selectedAvatar ? "sel" : ""}" data-a="${a}">${a}</button>`).join("")}</div>
        <button id="go">Join</button>`;
      document.getElementById("go").onclick = join;
      app.querySelectorAll(".av").forEach(b => b.onclick = () => {
        selectedAvatar = b.dataset.a;
        app.querySelectorAll(".av").forEach(x => x.classList.toggle("sel", x === b));
      });
    }

    async function join() {
      const c = document.getElementById("code").value.trim().toUpperCase();
      const name = document.getElementById("name").value.trim() || "Player";
      try {
        await joinRoom(c, uid, name, selectedAvatar);
        code = c;
        localStorage.setItem(JOIN_KEY, JSON.stringify({ code, name, avatar: selectedAvatar }));
        observeRoom(code, render);
      } catch (e) {
        renderJoin("Room not found. Check the code.");
      }
    }

    function render(room) {
      if (!room) return;
      stopTick();
      if (room.status === "lobby") {
        answeredFor = -1; // clear any lock from a previous game (Play again)
        app.innerHTML = `<h2>You're in!</h2><p class="msg">Waiting for the host to start…</p>`;
      } else if (room.status === "question") {
        renderQuestion(room);
      } else if (room.status === "reveal") {
        const me = (room.players || {})[uid] || {};
        app.innerHTML = `<h2>Score</h2><p class="big">${me.score || 0}</p><p class="msg">See the big screen for the answer.</p>`;
      } else if (room.status === "ended") {
        renderEnded(room);
      }
    }

    function renderQuestion(room) {
      const q = room.question;
      const locked = answeredFor === q.index;
      app.innerHTML = `
        <div class="timer" id="cd">…</div>
        <h2>${esc(q.prompt)}</h2>
        <div class="answers">${q.answers.map((a, i) =>
          `<button data-i="${i}" ${locked ? "disabled" : ""}>${esc(a)}</button>`).join("")}</div>
        ${locked ? `<p class="msg">Answer locked in.</p>` : ""}`;
      if (!locked) {
        app.querySelectorAll(".answers button").forEach(b => b.onclick = async () => {
          answeredFor = q.index;
          await submitAnswer(code, q.index, uid, Number(b.dataset.i));
          renderQuestion(room);
        });
      }
      const startedAt = q.startedAt || Date.now();
      stopTick();
      tick = setInterval(() => {
        const remaining = Math.max(0, startedAt + QUESTION_DURATION_MS - Date.now());
        const el = document.getElementById("cd");
        if (el) el.textContent = Math.ceil(remaining / 1000) + "s";
        if (remaining <= 0) {
          stopTick();
          app.querySelectorAll(".answers button").forEach(b => b.disabled = true);
        }
      }, 250);
    }

    function renderEnded(room) {
      const entries = Object.entries(room.players || {}).sort((a, b) => (b[1].score || 0) - (a[1].score || 0));
      const myRank = entries.findIndex(([id]) => id === uid) + 1;
      const me = (room.players || {})[uid] || {};
      app.innerHTML = `
        <h2>Game over</h2>
        <p class="big">#${myRank || "-"} · ${me.score || 0} pts</p>
        <p class="msg">Thanks for playing!</p>`;
    }

    function stopTick() { if (tick) { clearInterval(tick); tick = null; } }
    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c])); }
  </script>
</body>
</html>
