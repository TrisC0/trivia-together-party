<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trivia Together — Host</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background:#101427; color:#fff;
           min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.25rem; padding:1.5rem; text-align:center; }
    h1 { font-size: clamp(1.8rem, 5vw, 3.4rem); margin:0; }
    .code { font-size: clamp(3rem, 12vw, 7rem); letter-spacing:.3em; font-weight:800; color:#7cf; }
    .meta { opacity:.6; letter-spacing:.05em; text-transform:uppercase; font-size:.9rem; }
    .timer { font-size: clamp(2rem, 8vw, 4rem); font-weight:800; color:#7cf; }
    ul { list-style:none; padding:0; display:flex; flex-wrap:wrap; gap:.75rem; justify-content:center; }
    li { background:#22305c; padding:.5rem 1rem; border-radius:999px; }
    select { font-size:1.05rem; padding:.55rem 1rem; border-radius:10px; border:0; background:#22305c; color:#fff; }
    .pickers { display:flex; gap:.75rem; flex-wrap:wrap; justify-content:center; }
    button { font-size:1.25rem; padding:.75rem 2rem; border:0; border-radius:12px; background:#7cf; color:#101427; font-weight:700; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    .answers { display:grid; grid-template-columns:1fr 1fr; gap:1rem; max-width:760px; }
    .answers div { background:#22305c; padding:1rem 1.5rem; border-radius:12px; font-size:1.4rem; }
    .answers div.correct { background:#2ecc71; color:#101427; font-weight:700; }
    ol.board { list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:.4rem; min-width:260px; counter-reset:rank; }
    ol.board li { background:#22305c; padding:.5rem 1rem; border-radius:10px; display:flex; justify-content:space-between; }
    ol.board li::before { counter-increment:rank; content:counter(rank) ". "; opacity:.6; margin-right:.5rem; }
    .winner { font-size:1.6rem; color:#7cf; font-weight:800; }
    .hint { opacity:.6; }
  </style>
</head>
<body>
  <div id="app">Loading…</div>
  <script type="module">
    import { signInAnon } from "../shared/firebase.js";
    import { QUESTIONS } from "../shared/questions.js";
    import { QUESTION_DURATION_MS } from "../shared/scoring.js";
    import { fetchQuestions, CATEGORIES, DIFFICULTIES } from "../shared/opentdb.js";
    import { createRoom, observeRoom, observeAnswerCount, startQuestion, revealAndScore, endGame, resetGame, getRoom }
      from "../shared/room.js";

    const app = document.getElementById("app");
    const ROUND_COUNT = 8;

    let code = null;
    let gameQuestions = QUESTIONS;   // replaced with fetched questions at game start
    let category = null;             // host-selected OpenTDB category id
    let difficulty = null;           // host-selected OpenTDB difficulty
    let loading = false;
    let lastRoom = null;

    let timedQuestion = -1, tick = null, unsubAnswers = null, playerCount = 0;

    const HOST_KEY = "tt-host-room";
    const qKey = (c) => `tt-host-questions:${c}`;

    let uid = null;
    try {
      uid = await signInAnon();
      const saved = localStorage.getItem(HOST_KEY);
      const existing = saved ? await getRoom(saved) : null;
      if (existing && existing.host === uid) {
        code = saved;                                  // resume the same room after a refresh
        const sq = localStorage.getItem(qKey(code));   // restore the in-progress question set
        if (sq) { try { gameQuestions = JSON.parse(sq); } catch {} }
      } else {
        code = await createRoom(uid);
        localStorage.setItem(HOST_KEY, code);
      }
    } catch (e) {
      app.textContent = "Could not start a room. Check your connection and refresh.";
      throw e;
    }
    observeRoom(code, onRoom);

    function onRoom(room) {
      if (!room) return;
      lastRoom = room;
      playerCount = room.players ? Object.keys(room.players).length : 0;
      if (room.status === "question") ensureTiming(room); else stopTiming();
      render(room);
    }

    async function beginGame() {
      loading = true;
      render(lastRoom);
      const fetched = await fetchQuestions({ amount: ROUND_COUNT, category, difficulty });
      gameQuestions = fetched.length ? fetched : QUESTIONS.slice(0, ROUND_COUNT);
      localStorage.setItem(qKey(code), JSON.stringify(gameQuestions)); // survive a host refresh
      loading = false;
      startQuestion(code, 0, gameQuestions[0]);
    }

    function ensureTiming(room) {
      const qi = room.question ? room.question.index : 0;
      if (timedQuestion === qi) return;
      stopTiming();
      timedQuestion = qi;
      const startedAt = (room.question && room.question.startedAt) || Date.now();
      tick = setInterval(() => {
        const remaining = Math.max(0, startedAt + QUESTION_DURATION_MS - Date.now());
        const el = document.getElementById("countdown");
        if (el) el.textContent = Math.ceil(remaining / 1000) + "s";
        if (remaining <= 0) doReveal();
      }, 250);
      unsubAnswers = observeAnswerCount(code, qi, (n) => {
        if (playerCount > 0 && n >= playerCount) doReveal();
      });
    }

    function stopTiming() {
      if (tick) { clearInterval(tick); tick = null; }
      if (unsubAnswers) { unsubAnswers(); unsubAnswers = null; }
      timedQuestion = -1;
    }

    function doReveal() {
      const qi = timedQuestion;
      stopTiming();
      if (qi >= 0 && gameQuestions[qi]) revealAndScore(code, qi, gameQuestions[qi].correctIndex);
    }

    function render(room) {
      const players = room.players ? Object.values(room.players) : [];
      const ranked = [...players].sort((a, b) => (b.score || 0) - (a.score || 0));
      const total = gameQuestions.length;

      if (room.status === "lobby") {
        const catOpts = CATEGORIES.map(c =>
          `<option value="${c.id ?? ""}" ${(c.id ?? null) === category ? "selected" : ""}>${esc(c.label)}</option>`).join("");
        const diffOpts = DIFFICULTIES.map(d =>
          `<option value="${d.id ?? ""}" ${(d.id ?? null) === difficulty ? "selected" : ""}>${esc(d.label)}</option>`).join("");
        app.innerHTML = `
          <h1>Join at this code:</h1>
          <div class="code">${code}</div>
          <ul>${players.map(p => `<li>${esc(p.avatar || "")} ${esc(p.name)}</li>`).join("")}</ul>
          <div class="pickers">
            <select id="cat" ${loading ? "disabled" : ""}>${catOpts}</select>
            <select id="diff" ${loading ? "disabled" : ""}>${diffOpts}</select>
          </div>
          <button id="start" ${players.length === 0 || loading ? "disabled" : ""}>${loading ? "Loading questions…" : "Start game"}</button>`;
        const catSel = document.getElementById("cat");
        if (catSel) catSel.onchange = () => { category = catSel.value ? Number(catSel.value) : null; };
        const diffSel = document.getElementById("diff");
        if (diffSel) diffSel.onchange = () => { difficulty = diffSel.value || null; };
        bind("start", beginGame);

      } else if (room.status === "question") {
        const q = room.question;
        app.innerHTML = `
          <div class="meta">Question ${q.index + 1} of ${total}</div>
          <div class="timer" id="countdown">…</div>
          <h1>${esc(q.prompt)}</h1>
          <div class="answers">${q.answers.map(a => `<div>${esc(a)}</div>`).join("")}</div>`;

      } else if (room.status === "reveal") {
        const idx = room.reveal.questionIndex;
        const q = gameQuestions[idx];
        const last = idx >= total - 1;
        app.innerHTML = `
          <div class="meta">Question ${idx + 1} of ${total}</div>
          <h1>Answer: ${esc(q.answers[q.correctIndex])}</h1>
          <div class="answers">${q.answers.map((a, i) =>
            `<div class="${i === q.correctIndex ? "correct" : ""}">${esc(a)}</div>`).join("")}</div>
          <ol class="board">${ranked.map(p =>
            `<li><span>${esc(p.avatar || "")} ${esc(p.name)}</span><span>${p.score || 0}</span></li>`).join("")}</ol>
          <button id="next">${last ? "Final results" : "Next question"}</button>`;
        bind("next", () => last ? endGame(code) : startQuestion(code, idx + 1, gameQuestions[idx + 1]));

      } else if (room.status === "ended") {
        const winner = ranked[0];
        app.innerHTML = `
          <h1>Final results</h1>
          ${winner ? `<div class="winner">🏆 ${esc(winner.avatar || "")} ${esc(winner.name)} wins!</div>` : ""}
          <ol class="board">${ranked.map(p =>
            `<li><span>${esc(p.avatar || "")} ${esc(p.name)}</span><span>${p.score || 0}</span></li>`).join("")}</ol>
          <button id="again">Play again</button>`;
        bind("again", () => resetGame(code));
      }
    }

    function bind(id, fn) { const e = document.getElementById(id); if (e) e.onclick = fn; }
    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;" }[c])); }
  </script>
</body>
</html>
